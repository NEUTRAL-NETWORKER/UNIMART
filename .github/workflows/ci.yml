name: CI

on:
  push:
    branches: ["main", "unimart-v6-stable"]
  pull_request:
    branches: ["main", "unimart-v6-stable"]

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_API_URL: https://api.example.com/api
        run: npm run build

  backend-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile backend files
        run: python -m compileall .

      - name: Import smoke check
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/unimart_ci
          APP_ENV: development
        run: |
          python -c "import sys; sys.path.insert(0, '.'); import main; print('backend import ok')"
