name: Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  backend-image:
    name: Build And Publish Backend Image
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login To GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Image Name
        id: image
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/${OWNER_LOWER}/unimart-backend" >> "$GITHUB_OUTPUT"

      - name: Build Backend Image
        run: |
          docker build \
            -f backend/Dockerfile \
            -t "${{ steps.image.outputs.name }}:latest" \
            -t "${{ steps.image.outputs.name }}:${{ github.sha }}" \
            backend

      - name: Push Backend Image
        run: |
          docker push "${{ steps.image.outputs.name }}:latest"
          docker push "${{ steps.image.outputs.name }}:${{ github.sha }}"

  frontend-pages:
    name: Deploy Frontend To GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Validate Frontend API URL
        env:
          FRONTEND_VITE_API_URL: ${{ vars.FRONTEND_VITE_API_URL || secrets.FRONTEND_VITE_API_URL }}
        run: |
          if [ -z "$FRONTEND_VITE_API_URL" ]; then
            echo "Missing FRONTEND_VITE_API_URL repository variable/secret."
            echo "Set it to your backend API URL, for example: https://api.example.com/api"
            exit 1
          fi

      - name: Install Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ vars.FRONTEND_VITE_API_URL || secrets.FRONTEND_VITE_API_URL }}
          VITE_APP_BASENAME: ${{ github.event.repository.name }}
        run: npm run build

      - name: Add SPA 404 Fallback
        run: cp frontend/dist/index.html frontend/dist/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy To GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  trigger-backend-platform-deploy:
    name: Trigger Backend Platform Deploy
    runs-on: ubuntu-latest
    needs: backend-image
    if: ${{ always() && needs.backend-image.result == 'success' }}
    steps:
      - name: Trigger Deploy Hook
        env:
          BACKEND_DEPLOY_HOOK_URL: ${{ secrets.BACKEND_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$BACKEND_DEPLOY_HOOK_URL" ]; then
            echo "BACKEND_DEPLOY_HOOK_URL is not set. Skipping backend deploy hook trigger."
            exit 0
          fi
          curl -fsS -X POST "$BACKEND_DEPLOY_HOOK_URL"
